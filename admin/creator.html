<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>VILLANO.AI — Generador de Productos</title>
  <link rel="stylesheet" href="../css/dondelukas.css">
  <link rel="stylesheet" href="../css/creator.css">
</head>
<body class="creator-body">

  <!-- TOOLBAR ADMIN -->
  <aside class="admin-toolbar" id="toolbar">
    <div class="toolbar-header">
      <span class="toolbar-logo">VILLANO<span>.AI</span></span>
      <span class="toolbar-label">// CREATOR</span>
    </div>

    <div class="toolbar-section">
      <span class="toolbar-section-title">Insertar bloque</span>
      <div class="toolbar-buttons">
        <button class="tool-btn" data-action="add-cover">
          <span class="tool-icon">📕</span>
          <span class="tool-name">Portada</span>
        </button>
        <button class="tool-btn" data-action="add-chapter">
          <span class="tool-icon">📑</span>
          <span class="tool-name">Capítulo</span>
        </button>
        <button class="tool-btn" data-action="add-text">
          <span class="tool-icon">📝</span>
          <span class="tool-name">Texto</span>
        </button>
        <button class="tool-btn" data-action="add-highlight">
          <span class="tool-icon">💡</span>
          <span class="tool-name">Destacado</span>
        </button>
        <button class="tool-btn" data-action="add-list">
          <span class="tool-icon">📋</span>
          <span class="tool-name">Lista</span>
        </button>
        <button class="tool-btn" data-action="add-terminal">
          <span class="tool-icon">⌨️</span>
          <span class="tool-name">Terminal</span>
        </button>
        <button class="tool-btn" data-action="add-quote">
          <span class="tool-icon">💬</span>
          <span class="tool-name">Cita</span>
        </button>
        <button class="tool-btn" data-action="add-divider">
          <span class="tool-icon">➖</span>
          <span class="tool-name">Divisor</span>
        </button>
        <button class="tool-btn" data-action="add-callout">
          <span class="tool-icon">⚠️</span>
          <span class="tool-name">Callout</span>
        </button>
        <button class="tool-btn" data-action="add-image">
          <span class="tool-icon">🖼️</span>
          <span class="tool-name">Imagen</span>
        </button>
      </div>
    </div>

    <div class="toolbar-section">
      <span class="toolbar-section-title">Tamaño del canvas</span>
      <div class="size-buttons">
        <button class="size-btn active" data-size="desktop" title="Desktop (850px)">
          <span class="size-icon">🖥️</span>
          <span class="size-label">Desktop</span>
        </button>
        <button class="size-btn" data-size="tablet" title="Tablet (768px)">
          <span class="size-icon">📱</span>
          <span class="size-label">Tablet</span>
        </button>
        <button class="size-btn" data-size="mobile" title="Móvil (375px)">
          <span class="size-icon">📲</span>
          <span class="size-label">Móvil</span>
        </button>
        <button class="size-btn" data-size="story" title="Story (1080x1920)">
          <span class="size-icon">📱</span>
          <span class="size-label">Story</span>
        </button>
        <button class="size-btn" data-size="square" title="Cuadrado (1080x1080)">
          <span class="size-icon">⬜</span>
          <span class="size-label">Square</span>
        </button>
        <button class="size-btn" data-size="post" title="Post IG (1080x1350)">
          <span class="size-icon">📷</span>
          <span class="size-label">Post IG</span>
        </button>
      </div>
      <div class="size-info" id="size-info">850 × auto px</div>
    </div>

    <div class="toolbar-section">
      <span class="toolbar-section-title">Exportar</span>
      <div class="toolbar-actions">
        <button class="action-btn primary" id="btn-export">
          <span>📄 Exportar PDF</span>
        </button>
        <button class="action-btn highlight" id="btn-capture">
          <span>📸 Capturar Imagen</span>
        </button>
        <button class="action-btn" id="btn-preview">
          <span>👁️ Preview</span>
        </button>
      </div>
    </div>

    <div class="toolbar-section">
      <span class="toolbar-section-title">Guardar / Cargar</span>
      <div class="toolbar-actions">
        <button class="action-btn" id="btn-save">
          <span>💾 Guardar JSON</span>
        </button>
        <button class="action-btn" id="btn-load">
          <span>📂 Cargar JSON</span>
        </button>
        <button class="action-btn danger" id="btn-clear">
          <span>🗑️ Limpiar todo</span>
        </button>
      </div>
    </div>

    <div class="toolbar-section">
      <span class="toolbar-section-title">Configuración</span>
      <div class="toolbar-config">
        <label class="config-item">
          <span>Título del documento:</span>
          <input type="text" id="doc-title" value="Manual del Villano" placeholder="Título...">
        </label>
        <label class="config-item">
          <span>Subtítulo:</span>
          <input type="text" id="doc-subtitle" value="Conocimiento prohibido" placeholder="Subtítulo...">
        </label>
        <label class="config-item">
          <span>Versión:</span>
          <input type="text" id="doc-version" value="v1.0" placeholder="v1.0">
        </label>
        <label class="config-item">
          <span>Tema de color:</span>
          <select id="doc-theme">
            <option value="cyan">Cyan (default)</option>
            <option value="magenta">Magenta</option>
            <option value="green">Verde Matrix</option>
            <option value="red">Rojo</option>
          </select>
        </label>
      </div>
    </div>

    <div class="toolbar-footer">
      <span class="version-text">VILLANO.AI Creator v1.0</span>
    </div>
  </aside>

  <!-- MAIN DOCUMENT AREA -->
  <main class="document-area" id="document">
    <div class="document-container" id="doc-container">

      <!-- Placeholder inicial -->
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">📄</div>
        <h2>Documento vacío</h2>
        <p>Usa la barra lateral para añadir bloques de contenido.</p>
        <p class="empty-hint">Cada bloque es editable. Haz click para modificar el texto.</p>
      </div>

    </div>
  </main>

  <!-- BLOCK CONTROLS (aparece al hover de cada bloque) -->
  <div class="block-controls" id="block-controls">
    <button class="block-ctrl-btn" data-action="move-up" title="Mover arriba">↑</button>
    <button class="block-ctrl-btn" data-action="move-down" title="Mover abajo">↓</button>
    <button class="block-ctrl-btn" data-action="duplicate" title="Duplicar">⧉</button>
    <button class="block-ctrl-btn danger" data-action="delete" title="Eliminar">×</button>
  </div>

  <!-- Preview Bar (aparece en modo preview) -->
  <div class="preview-bar" id="preview-bar">
    <span class="preview-bar-text">MODO PREVIEW</span>
    <div class="preview-bar-actions">
      <button class="preview-bar-btn" id="btn-exit-preview">
        <span>✏️ Volver a editar</span>
      </button>
      <button class="preview-bar-btn primary" id="btn-capture-preview">
        <span>📸 Capturar</span>
      </button>
    </div>
  </div>

  <!-- Hidden file input for loading JSON -->
  <input type="file" id="file-input" accept=".json" style="display: none;">

  <!-- html2canvas for image capture -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="../js/creator.js"></script>
</body>
</html>
